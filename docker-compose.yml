version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: tasks_mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: tasks_db
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-prootpassword"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: tasks_backend
    restart: always
    environment:
      - DATABASE_URL=mysql+pymysql://root:rootpassword@mysql:3306/tasks_db
      - SECRET_KEY=SUPER_SECRET_KEY_FOR_JWT_TOKEN_123!@#
      - ACCESS_TOKEN_EXPIRE_MINUTES=60
    ports:
      - "8000:8000"
    volumes:
      - ./backend/uploads:/app/uploads
      - ./backend/faiss_index.bin:/app/faiss_index.bin
      - ./backend/metadata_sidecar.pkl:/app/metadata_sidecar.pkl
    depends_on:
      mysql:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: tasks_frontend
    restart: always
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:8000/api/v1
    depends_on:
      - backend

volumes:
  mysql_data:
